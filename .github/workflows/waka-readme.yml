name: Update WakaTime Stats

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update WakaTime Stats in README
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          TIME_RANGE: all_time
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_TOTAL: true
          STOP_AT_OTHER: true
          IGNORED_LANGUAGES: YAML JSON TOML
          TARGET_BRANCH: waka-updates
          TARGET_PATH: README.md
          COMMIT_MESSAGE: "chore: update WakaTime stats"
          AUTHOR_NAME: Belam
          AUTHOR_EMAIL: belammuia0@gmail.com

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: waka-updates
          title: "Update WakaTime stats"
          body: "This PR updates the WakaTime stats in the README automatically."
          base: main   # ✅ target main instead of master
