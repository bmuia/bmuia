name: Waka Readme

on:
  workflow_dispatch:     # manual run
  schedule:
    - cron: "0 0 * * *"  # runs daily at midnight UTC

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    permissions:
      contents: write   
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}   
          SHOW_TITLE: true
          SECTION_NAME: waka
          TIME_RANGE: all_time
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_TOTAL: true
          STOP_AT_OTHER: true
          IGNORED_LANGUAGES: YAML JSON TOML
          TARGET_BRANCH: main                  
          TARGET_PATH: README.md
          COMMIT_MESSAGE: "chore: update WakaTime stats"
          AUTHOR_NAME: Belam
          AUTHOR_EMAIL: belammuia0@gmail.com
